# src/resolvekit/builder/data/oecd_crosswalk.yaml
#
# Hand-maintained map from OECD codes to existing entity_ids in geo/org packs.
# Add a row whenever an OECD code refers to an entity that already exists in
# resolvekit (so we don't create a duplicate). Unknown codes are fine — the
# enricher just creates a new entity for them.
#
# CONVENTION: values are entity_ids. Use YAML `null` for a code you've
# identified as belonging to an existing entity but haven't yet located that
# entity's id (a placeholder). `null` rows are skipped by the enricher and
# by crosswalk validation — they're a marker for follow-up, not an error.
#
# WIRING DISCIPLINE
# ─────────────────
# Crosswalk targets are looked up in both geo and org DBs at validation time;
# the enricher routes code/name writes to whichever DB the entity actually lives
# in. `null` still means deferred-mapping (skip). A non-null entity_id that
# exists in neither available DB raises ValueError.
#
version: 1
providers:           # OECD provider code (multilateral, no iso3) -> entity_id
  # World Bank Group
  "901": undata-geo/G00700200  # International Bank for Reconstruction and Development (IBRD)
  "902": null        # Multilateral Investment Guarantee Agency (MIGA) — no geo entity found
  "903": undata-geo/G00600230  # International Finance Corporation (IFC)
  "905": undata-geo/G00600220  # International Development Association (IDA)
  # Caribbean / Central / South America MDBs
  "906": undata-geo/G00700600  # Caribbean Development Bank (CDB)
  "909": undata-geo/G00700700  # Inter-American Development Bank (IDB)
  "910": null        # Central American Bank for Economic Integration (CABEI) — no geo entity found
  # Global financial / monetary
  "907": undata-geo/G00600900  # International Monetary Fund (IMF)
  "956": null        # IMF Trust Fund — sub-entity of IMF; no distinct geo entry
  "958": null        # IMF (Concessional Trust Funds) — sub-entity of IMF; no distinct geo entry
  # African MDBs
  "913": undata-geo/G00700400  # African Development Bank (AfDB)
  "914": null        # African Development Fund (AfDF) — no distinct geo entity found
  # Asian MDB
