channels: {}         # OECD channel code -> entity_id
                     # All key channel->org matches confirmed in geo_db but not yet wired.
                     # See crosswalk header "CONFIRMED MATCHES" for full list.
agencies: {}         # "<DONOR_ISO3>:<agency_code>" -> entity_id
                     # No bilateral agency (USAID, GIZ, JICA, FCDO, AFD, KOICA, NORAD,
                     # DANIDA, Sida, SDC, KfW, CIDA, etc.) has a prior entity in the geo DB.
recipients: {}       # OECD recipient code -> entity_id
                     # Countries get attached via iso3 automatically.
                     # 26 region-type recipients (Africa regional, Caribbean regional, etc.)
                     # have no matching entry in geo DB; they will be created as new entities.
